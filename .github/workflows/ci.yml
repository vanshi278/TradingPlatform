name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: alphaforge
          POSTGRES_PASSWORD: alphaforge
          POSTGRES_DB: alphaforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alphaforge -d alphaforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: alphaforge
      POSTGRES_PASSWORD: alphaforge
      POSTGRES_DB: alphaforge
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply database schema
        working-directory: backend
        run: python -c "from data.storage import init_schema; init_schema()"

      - name: Run tests
        working-directory: backend
        run: pytest -q
